<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — BusGo</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <a href="../index.html" class="logo">🚌 BusGo</a>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="routes.html">Routes</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
        </div>
        <button id="darkToggle" onclick="toggleDark()">🌙 Dark Mode</button>
    </nav>

    <div class="form-container">
        <h2>📝 Create Account</h2>
        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="+91 98765 43210" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="form-btn">Create Account</button>
        </form>
        <div class="form-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
